      - paragraph [ref=e223]:
        - strong [ref=e225]: Copilot Tasks
        - text: . If you weren’t paying close attention, you might think this was just a regular M365 Copilot feature, a bit like the mysterious
        - link "scheduled prompts" [ref=e227] [cursor=pointer]:
          - /url: https://www.perspectives.plus/p/the-secret-life-of-copilot-scheduled-prompts
        - text: I’ve explored earlier. But it’s nothing like that. Tasks is a
        - strong [ref=e229]: consumer Copilot
        - text: capability that was
        - link "launched" [ref=e231] [cursor=pointer]:
          - /url: https://www.microsoft.com/en-us/microsoft-copilot/blog/2026/02/26/copilot-tasks-from-answers-to-actions/?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
