      - paragraph [ref=e333]:
        - text: Notice how even the URL in the video’s mock UI points to the consumer version of Copilot, not the M365 work version?
        - emphasis [ref=e335]: Who cares, we are reimagining autopilots here!
        - text: On the bright side (for Microsoft), most people watching the video will not even have the technical ability to try the Frontier preview, so they won’t know it’s just aspirational animations rather than a real product at this point.
      - paragraph [ref=e337]: So, what are the prerequisites? The fun part is, not even Microsoft seems to agree on them. The docs page for getting started with Scout has gone through multiple revisions over the first few days. The requirements for Microsoft 365 Copilot license have gone on, off, and then on again. Similarly, the GitHub Copilot Business or Enterprise license requirement was added there after the launch.
      - paragraph [ref=e342]: Upon testing it with my demo user account (I ain’t gonna let this thing access my real customer data!), there didn’t seem to be any license enforcement for the M365 Copilot license. Activation on a Windows 365 machine in my tenant went through just fine without it. And why wouldn’t it, because this thing doesn’t run on Copilot Credits. Instead, it burns GitHub Copilot AI Credits like there’s no tomorrow.🔥
