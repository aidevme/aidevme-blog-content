          - strong [ref=e117]: Autopilots are here!
        - text: "This was the Build 2026 keynote message from Satya Nadella last week:"
      - generic [ref=e119]:
        - paragraph [ref=e123]:
          - emphasis [ref=e125]: “Today we are introducing a new category of agents called Autopilots. Autopilots are always-on agents that work autonomously, with their own identity, and act on your behalf. Autopilots stay active in the background, understand how work gets done across your apps and systems, and
          - emphasis [ref=e127]:
            - strong [ref=e128]: take action without needing to be prompted each time
          - emphasis [ref=e130]: .”
        - generic [ref=e132]: Satya Nadella, Microsoft Build 2026 keynote
      - paragraph [ref=e134]:
        - text: So, Microsoft is no longer
        - emphasis [ref=e136]: The Copilot Company
        - text: that Satya envisioned a couple of years ago. Which makes sense, given how the Copilot brand has not become quite as valuable as the company would have wanted to. While it’s present in most organizations, thanks to the massive distribution power of Microsoft, we’ve seen
        - link "reports" [ref=e138] [cursor=pointer]:
          - /url: https://www.reconanalytics.com/ai-choice-2026-why-licenses-dont-equal-adoption/?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: of how when given a choice, users actively pick something other than Copilot.
      - paragraph [ref=e140]:
        - text: It’s not yet clear at this point whether Autopilots become a proper brand or just remain a concept used in marketing. In any case, it feels like a missed opportunity to pick a new AI brand that would have carried more positive emotions for many of today’s tech workers that grew up in the 90s (credit to Tim Mayo for
        - link "the idea" [ref=e142] [cursor=pointer]:
          - /url: https://www.linkedin.com/feed/update/urn:li:activity:7468197320426266624/?dashCommentUrn=urn%3Ali%3Afsd_comment%3A%287468318742528188416%2Curn%3Ali%3Aactivity%3A7468197320426266624%29&utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: "):"
      - paragraph [ref=e148]: "Drake meme: Autopilots vs. Autobots"
      - paragraph [ref=e150]: The flagship Autopilot of this new category of AI agents presented at Build was Microsoft Scout. The subscribers of this newsletter may know it by its former name, ClawPilot, that has been used in context of the MS internal version of Scout.
      - 'link "Clawpilot: no UI for AI What if we didn''t have to open Copilot and just hope we prompted it the right way? The rise of OpenClaw has shifted expectations on what AI agents can do when given the (scary) permissions. Perspectives on Power Platform • Jukka Niiranen" [ref=e152] [cursor=pointer]':
        - /url: https://www.perspectives.plus/p/clawpilot-no-ui-for-ai
        - generic [ref=e155]:
          - paragraph [ref=e157]: "Clawpilot: no UI for AI"
          - paragraph [ref=e159]: What if we didn't have to open Copilot and just hope we prompted it the right way? The rise of OpenClaw has shifted expectations on what AI agents can do when given the (scary) permissions.
          - paragraph [ref=e161]: Perspectives on Power Platform • Jukka Niiranen
      - paragraph [ref=e164]:
        - text: In this week’s issue, I will take a deeper look at what the official story with Microsoft Scout is and how it differs from the observable reality. The
        - link "Frontier preview announcement" [ref=e166] [cursor=pointer]:
          - /url: https://www.microsoft.com/en-us/microsoft-365/blog/2026/06/02/introducing-microsoft-scout-your-always-on-personal-agent/?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: doesn’t quite tell the full story but that’s okay — more material for me to cover in Perspectives, then! But first, let’s zoom out a bit and put all these recent AI pilots into perspective.
      - heading "Let me count the Autopilots" [level=1] [ref=e168]
      - paragraph [ref=e170]:
        - text: Keeping up with Microsoft’s AI agent products is the kind of a task where I personally definitely welcome help from AI tools. Even if I have a good hunch of what I should be looking for and where, it would simply take too much time to manually open the tens or even hundreds of web pages that provide relevant bits of information. So, I once again requested Claude to produce a single HTML page that illustrates
        - link "the big picture of Autopilots" [ref=e172] [cursor=pointer]:
          - /url: https://vibes.jukkan.com/mapping-autopilots.html?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: ":"
      - generic [ref=e174]:
        - link [ref=e175] [cursor=pointer]:
          - /url: https://vibes.jukkan.com/mapping-autopilots.html?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - link "Microsoft's search for the treasure of autonomous AI agents" [ref=e177] [cursor=pointer]:
          - /url: https://vibes.jukkan.com/mapping-autopilots.html
          - paragraph [ref=e180]: Microsoft's search for the treasure of autonomous AI agents
      - paragraph [ref=e182]: Let’s go through the points on this AI treasure map and see how they align with the Autopilot story.
      - paragraph [ref=e184]:
        - strong [ref=e186]: Copilot Studio agents
        - text: . Most of us know this story already. In Spring 2025, Microsoft published the first and so far only numbers on how much Copilot Studio agents were being used by their customers (equaling roughly
        - link "0.04%" [ref=e188] [cursor=pointer]:
          - /url: https://www.perspectives.plus/p/microsofts-non-profit-ai-adventures
        - text: of Microsoft total revenue). Since then, autonomy has been introduced by adding essentially Power Automate style triggers into Copilot Studio agents. In the
        - link "very latest twist" [ref=e190] [cursor=pointer]:
          - /url: https://techcommunity.microsoft.com/blog/copilot-studio-blog/meet-the-new-copilot-studio-rebuilt-for-more-complex-multi-step-work/4526488?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: ", such logic is now moved away from agents and into Copilot Studio workflows."
      - generic [ref=e192]:
        - link [ref=e193] [cursor=pointer]:
          - /url: https://techcommunity.microsoft.com/blog/copilot-studio-blog/meet-the-new-copilot-studio-rebuilt-for-more-complex-multi-step-work/4526488?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - paragraph [ref=e197]: New Workflows editor in the modern Copilot Studio experience.
      - paragraph [ref=e199]:
