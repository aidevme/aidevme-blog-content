        - text: and there’s no news on when the preview period might end.
      - generic [ref=e239]:
        - link [ref=e240] [cursor=pointer]:
          - /url: https://learn.microsoft.com/en-us/answers/questions/5900354/i-receive-message-from-copilot-task-you-have-reach?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - paragraph [ref=e244]: Copilot customers not happy with Tasks capacity limits frozen in late May.
      - paragraph [ref=e246]:
        - strong [ref=e248]: Copilot Cowork
        - text: . Anthropic’s victory lap. After Microsoft’s own efforts to use OpenAI’s models to allow Office tools to generate useful documents had failed repeatedly, the solution came from partnering with another AI lab. Licensing the Cowork harness familiar from Claude Desktop and making it run in the cloud as Copilot Cowork has shown itself to be the most applauded tool in M365 Copilot. All of this despite it being built on Linux VMs and leveraging
        - link "tools like LibreOffice" [ref=e250] [cursor=pointer]:
          - /url: https://www.linkedin.com/feed/update/urn:li:activity:7458244805907714049?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: to generate and validate MS Office docs. But it’s the end result that counts. During the Frontier preview phase, there aren’t even any Copilot Credit costs for running the tool — although
        - link "I certainly wouldn’t bet on it" [ref=e252] [cursor=pointer]:
          - /url: https://www.linkedin.com/feed/update/urn:li:activity:7470102839747297280/?dashCommentUrn=urn%3Ali%3Afsd_comment%3A%287470741676014178304%2Curn%3Ali%3Aactivity%3A7470102839747297280%29&utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: being the commercial model going forward…
      - paragraph [ref=e257]:
        - strong [ref=e259]: Microsoft Scout
        - text: . Taking OpenClaw, a thing Satya Nadella once
        - link "compared to a virus" [ref=e261] [cursor=pointer]:
          - /url: https://www.linkedin.com/feed/update/urn:li:activity:7445013912439259136?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: ", and deploying it inside your Microsoft 365 tenant. This is now positioned as the new era of truly autonomous AI agents and the whole Autopilot story basically relies on Microsoft getting it right. There’s certainly a lot of synergy in how the enterprise giant could potentially tame the wild beast of OpenClaw and make"
        - generic [ref=e262]: "2025"
        - text: 2026 the year of AI agents for real.
      - heading "Yeah, about that Responsible AI…" [level=1] [ref=e264]
      - paragraph [ref=e266]:
        - text: Before anyone even had a chance to try it, there was already controversy online about the new Scout product. 404 Media had received the internal strategy document that outlined how Microsoft wanted to
        - link "“make people addicted” to the tool" [ref=e268] [cursor=pointer]:
          - /url: https://www.404media.co/microsoft-wants-to-make-people-addicted-to-scout-its-new-ai-assistant-internal-documents-reveal/?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: before rolling out additional functionality. While it is hardly a secret that software vendors would want their customers to crave for their products, this kind of language easily raises concerns about the AI addiction phenomenon that has been getting more and more coverage in the media.
      - paragraph [ref=e270]:
        - text: For Microsoft in particular, this image does not align well with the
        - link "humanist superintelligence" [ref=e272] [cursor=pointer]:
          - /url: https://microsoft.ai/news/towards-humanist-superintelligence/?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: "message recently promoted by their AI CEO, Mustafa Suleyman. Perhaps this was one reason why Satya Nadella’s reaction to the addiction headlines was so strong:"
        - emphasis [ref=e274]: “Not sure what this document is or who is writing and leaking this nonsense! They may want to go work elsewhere.”
        - text: This, in turn, resulted in an even better headline for the
        - link "follow-up article" [ref=e276] [cursor=pointer]:
          - /url: https://www.404media.co/satya-nadella-not-sure-who-said-microsoft-wanted-to-make-addictive-ai-is-looking-for-guy-who-did-this/?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: "on 404 Media:"
      - paragraph [ref=e282]: Satya Nadella ‘Not Sure’ Who Said Microsoft Wanted to Make Addictive AI, Is Looking for Guy Who Did This
      - paragraph [ref=e284]: “The guy” is of course Omar Shahine. After many long-time Microsoft senior leaders recently decided to leave the company, this has given room for new rising stars. Alongside the certified superstar Charles Lamanna, the former Corporate Vice President of Word, Omar, is certainly one to watch for. Sure, he’s been at MSFT since 1999 already, but I feel there are big things ahead for his new team that’s bringing OpenClaw to M365.
      - link "Upgrade to Plus for my full Perspectives" [ref=e287] [cursor=pointer]:
        - /url: https://www.perspectives.plus/upgrade
      - paragraph [ref=e289]:
        - text: What started as Omar’s
        - link "personal project" [ref=e291] [cursor=pointer]:
          - /url: https://www.omarknows.ai/p/meet-lobster-my-personal-ai-assistant?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: of running a local OpenClaw deployment on a MacBook in his home office, then evolved into a
        - link "vibe-coded home automation integration with OpenClaw" [ref=e293] [cursor=pointer]:
          - /url: https://github.com/omarshahine/HomeClaw?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: ", has turned into a big bet for Microsoft. Back when Project Lobster was originally published, I found myself"
        - link "wondering" [ref=e295] [cursor=pointer]:
          - /url: https://jukkan.com/openclaw-open-the-front-door/?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: ":"
        - emphasis [ref=e297]: “hmm, is this fully aligned with Microsoft’s internal information security policy for their product leaders?”
        - text: Well, obviously it was perfectly fine to wire up the physical sensors of your home office with an autonomous LLM agent and let it observe any meetings the CVP was having.
      - paragraph [ref=e299]:
        - text: Anyway, let’s circle back to that addiction part. We know Satya was also an
        - link "early follower of the OpenClaw project" [ref=e301] [cursor=pointer]:
          - /url: https://bsky.app/profile/jukkan.bsky.social/post/3meicmoq7mc2c?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: ", which could be justified by the business potential and technological novelty. At some point, though, things may get too intimate between tech geeks and AI agents. Wikipedia says:"
        - emphasis [ref=e303]: “
        - link "AI anthropomorphism" [ref=e305] [cursor=pointer]:
          - /url: https://en.wikipedia.org/wiki/AI_anthropomorphism?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
          - emphasis [ref=e306]: AI anthropomorphism
        - emphasis [ref=e308]: is the attribution of human-like feelings, mental states, and behavioral characteristics to artificial intelligence systems.”
        - text: Now, if there was a picture in that article, it might as well be something like what Omar
        - link "posted" [ref=e310] [cursor=pointer]:
          - /url: https://www.linkedin.com/posts/omarshahine_microsoftbuild-share-7469104323998916608-Js4W/?utm_source=share&utm_medium=member_desktop&rcm=ACoAAACGJiIBcJyHulqayo1QpVEwM3vEkTAqHFg
        - text: ":"
      - generic [ref=e312]:
        - link [ref=e313] [cursor=pointer]:
          - /url: https://www.linkedin.com/posts/omarshahine_microsoftbuild-share-7469104323998916608-Js4W/?utm_source=share&utm_medium=member_desktop&rcm=ACoAAACGJiIBcJyHulqayo1QpVEwM3vEkTAqHFg
        - paragraph [ref=e317]: “What do you think about being the first Scout in the world, ever?” Omar Shahine having a conversation with his OpenClaw-based AI agent named “Sebastian”.
      - paragraph [ref=e319]:
        - text: You may not see your Copilot as a lovable person when opening M365 tools. Yet the design of Microsoft Scout and how it is marketed is definitely maximizing the chances of humans mistaking AI for an actual person. It goes well beyond
        - link "giving Copilot a face" [ref=e321] [cursor=pointer]:
          - /url: https://www.microsoft.com/en-us/microsoft-copilot/blog/2025/10/23/human-centered-ai/?utm_campaign=scout-claw-cowork-tasks-opal-agent-365&utm_medium=referral&utm_source=www.perspectives.plus
        - text: and calling it
        - emphasis [ref=e323]: “your AI companion”
        - text: . Rather than being an app you need to proactively launch, Scout is designed to be a thing that reaches out to you when there are signals and decisions requiring your attention. It will live in the same chats as messages from your real colleagues and friends. In the increasingly digital world that surrounds us, forgetting that Sebastian isn’t real is becoming all too easy.
      - heading "Will the Real ClawPilot please stand up?" [level=1] [ref=e325]
      - paragraph [ref=e327]: "Finally, let’s look at what is real and available today. As is often the case, what the Microsoft marketing blog posts say and what the docs actually reveal are two different things. Rarely has it been as obvious as it is with Microsoft Scout, though. This is what the marketing team would like you to think Scout is:"
