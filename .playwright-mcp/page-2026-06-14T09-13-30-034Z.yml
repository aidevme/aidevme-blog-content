        - text: ", this was supposed to be"
        - emphasis [ref=e205]: “a new AI-powered capability that executes task-based work inside a secure, observable environment you control”
        - text: . After Microsoft revamped the M365 Copilot app navigation, rediscovering the Opal (Frontier) agent has been challenging. This made me question whether the project was still alive, yet I did manage to re-provision the related Opal Windows 365 cloud PC that had been deleted due to inactivity. Nothing much has been announced after November 2025 around this, though.
